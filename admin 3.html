
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>JoyFormiga ADM - Horários</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}
.card{
background:#fff;
padding:20px;
border-radius:12px;
max-width:500px;
margin:auto;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}
button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#8e44ad;
color:#fff;
font-weight:bold;
cursor:pointer;
}
label{
font-weight:bold;
display:block;
margin-top:15px;
}
</style>
</head>
<body>

<div class="card">
<h2>Configuração de Horário</h2>

<label>Horário de abertura</label>
<input type="number" id="openHour" min="0" max="23" value="15">

<label>Horário de fechamento</label>
<input type="number" id="closeHour" min="1" max="24" value="24">

<label>Mensagem quando fechado</label>
<textarea id="closedMessage">Estamos fechados, abriremos a partir das 15 horas. Aguardo seu pedido 💜</textarea>

<label>
<input type="checkbox" id="vacationMode">
 Loja fechada por folga/férias
</label>

<button onclick="saveSettings()">Salvar configurações</button>

<p id="status"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDummy",
  authDomain: "joyformiga.firebaseapp.com",
  databaseURL: "https://joyformiga-default-rtdb.firebaseio.com",
  projectId: "joyformiga"
};

try {
firebase.initializeApp(firebaseConfig);
} catch(e){}

const db = firebase.database();
const menuRef = db.ref('joyformigaMenu');

menuRef.child('storeSettings').on('value', snap => {
  const s = snap.val() || {};

  document.getElementById('openHour').value = s.openHour || 15;
  document.getElementById('closeHour').value = s.closeHour || 24;
  document.getElementById('closedMessage').value = s.closedMessage || '';
  document.getElementById('vacationMode').checked = s.vacationMode || false;
});

function saveSettings() {
  menuRef.child('storeSettings').set({
    openHour: Number(document.getElementById('openHour').value),
    closeHour: Number(document.getElementById('closeHour').value),
    closedMessage: document.getElementById('closedMessage').value,
    vacationMode: document.getElementById('vacationMode').checked
  });

  document.getElementById('status').innerText = 'Configurações salvas com sucesso!';
}
</script>

</body>
</html>
